<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snoopd</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes bar {
      0%   { width: 0%; }
      80%  { width: 90%; }
      100% { width: 100%; }
    }

    .card {
      animation: fade-in 0.4s ease both;
      background: rgba(15, 15, 20, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .shimmer-text {
      background: linear-gradient(
        90deg,
        #a78bfa 0%,
        #f472b6 40%,
        #818cf8 60%,
        #a78bfa 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2.4s linear infinite;
    }

    .pulse-dot::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: #a78bfa;
      animation: pulse-ring 1.4s ease-out infinite;
    }

    .progress-bar {
      animation: bar 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
  </style>
</head>
<body>
  <div class="w-full h-full flex items-center justify-center p-3">
    <div class="card w-full h-full rounded-2xl shadow-2xl flex flex-col items-center justify-center gap-4 px-8">

      <!-- Logo row -->
      <div class="flex items-center gap-3" style="animation: fade-in 0.5s ease 0.1s both;">
        <!-- Icon -->
        <div class="relative w-9 h-9 flex items-center justify-center">
          <div class="pulse-dot relative w-3 h-3 rounded-full bg-violet-400"></div>
        </div>

        <!-- App name -->
        <span class="shimmer-text text-3xl font-bold tracking-tight" style="letter-spacing:-0.03em;">
          Snoopd beta v1
        </span>
      </div>

      <!-- Tagline -->
      <p class="text-zinc-400 text-xs tracking-widest uppercase" style="animation: fade-in 0.5s ease 0.25s both;">
        Network Intelligence
      </p>

      <!-- Progress bar -->
      <div class="w-full max-w-xs" style="animation: fade-in 0.5s ease 0.4s both;">
        <div class="w-full h-0.5 rounded-full bg-zinc-800 overflow-hidden">
          <div class="progress-bar h-full rounded-full bg-gradient-to-r from-violet-500 to-pink-500"></div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
